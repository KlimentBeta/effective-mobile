<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }</style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <a href="{% url 'index' %}" class="position-absolute top-0 start-0 p-3 text-decoration-none">← На главную</a>
    <div class="card shadow-sm p-4" style="width: 400px;">
        <h4 class="text-center mb-3">Регистрация</h4>
        
        {% if error %}
        <div class="alert alert-danger py-2 mb-3">{{ error }}</div>
        {% endif %}
        
        <form action="{% url 'register' %}" method="POST">
            {% csrf_token %}
            <div class="mb-2">
                <input type="text" name="last_name" class="form-control" placeholder="Фамилия" required>
                <input type="text" name="first_name" class="form-control mt-2" placeholder="Имя" required>
                <input type="text" name="middle_name" class="form-control mt-2" placeholder="Отчество">
            </div>
            <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>
            <input type="password" name="password" class="form-control mb-2" placeholder="Пароль" required>
            <input type="password" name="password_confirm" class="form-control mb-3" placeholder="Повторите пароль" required>
            <button type="submit" class="btn btn-success w-100">Создать аккаунт</button>
        </form>
        <div class="text-center mt-3">
            <small>Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></small>
        </div>
    </div>
</body>
</html>
