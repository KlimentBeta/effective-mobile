<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }</style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <a href="{% url 'index' %}" class="position-absolute top-0 start-0 p-3 text-decoration-none">← На главную</a>
    <div class="card shadow-sm p-4" style="width: 350px;">
        <h4 class="text-center mb-3">Вход</h4>
        
        {% if error %}
        <div class="alert alert-danger py-2 mb-3">{{ error }}</div>
        {% endif %}
        
        <form action="{% url 'login' %}" method="POST">
            {% csrf_token %}
            <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Пароль" required>
            <button type="submit" class="btn btn-primary w-100">Войти</button>
        </form>
        <div class="text-center mt-3">
            <small>Нет аккаунта? <a href="{% url 'register' %}">Регистрация</a></small>
        </div>
    </div>
</body>
</html>
